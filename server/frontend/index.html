<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily MRG Report Generator</title>
    <!-- Use Inter font for a clean, modern aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Premium dark mode palette */
            --bg-base: #0f172a;
            --bg-surface: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            
            --accent-primary: #3b82f6;
            --accent-hover: #2563eb;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            
            --shadow-glow: 0 0 20px rgba(59, 130, 246, 0.3);
            
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Subtle background gradient to add depth */
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }

        /* The glassmorphic chat container */
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 85vh;
            margin: 2rem;
            background: var(--bg-surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        .chat-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .avatar-container {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.25rem;
            box-shadow: var(--shadow-glow);
        }

        .header-text h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .header-text p {
            font-size: 0.875rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.25rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #10b981;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.6);
        }

        .chat-messages {
            flex-grow: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Custom Scrollbar for messages area */
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 16px;
            line-height: 1.5;
            position: relative;
            animation: slideUp 0.3s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        .message.agent {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.user {
            background: var(--accent-gradient);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: var(--shadow-glow);
        }

        .message p {
            margin-bottom: 0.5rem;
        }
        .message p:last-child {
            margin-bottom: 0;
        }

        .chat-input-area {
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            background: rgba(15, 23, 42, 0.5);
        }

        /* Premium Buttons */
        .primary-btn {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .primary-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.4);
        }

        .primary-btn:active {
            transform: translateY(1px);
        }

        .primary-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: transparent;
            color: var(--accent-primary);
            border: 1px solid var(--accent-primary);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            margin-top: 1rem;
            transition: all 0.2s;
        }

        .download-btn:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .download-btn svg {
            width: 20px;
            height: 20px;
        }

        .email-form {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .email-input {
            flex-grow: 1;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.875rem;
            outline: none;
            transition: all 0.2s;
        }

        .email-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }

        .secondary-btn {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--border-color);
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .secondary-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .action-container {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .table-wrap {
            margin-top: 1rem;
            width: 100%;
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }

        th, td {
            border-bottom: 1px solid var(--border-color);
            padding: 0.5rem 0.6rem;
            text-align: left;
            white-space: nowrap;
        }

        th {
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* Typing indicator micro-animation */
        .typing {
            display: flex;
            gap: 0.3rem;
            padding: 0.5rem 0;
            align-items: center;
        }
        
        .typing span {
            width: 6px;
            height: 6px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <header class="chat-header">
            <div class="avatar-container">AI</div>
            <div class="header-text">
                <h1>Report Agent</h1>
                <p><span class="status-dot"></span> Online and ready</p>
            </div>
        </header>

        <div class="chat-messages" id="chatMessages">
            <div class="message agent">
                <p>Hello! I am your Automated Reporting Service.</p>
                <p>Click schedule to run the report agent. The live tracking table will show how each customer report is generated and emailed.</p>
            </div>
        </div>

        <div class="chat-input-area">
            <button class="primary-btn" id="generateBtn" onclick="runSchedule('both')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                Schedule Both Reports Now
            </button>
            <button class="secondary-btn" style="margin-left: 0.5rem;" onclick="runSchedule('10am')">Run 10am</button>
            <button class="secondary-btn" style="margin-left: 0.5rem;" onclick="runSchedule('11am')">Run 11am</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const generateBtn = document.getElementById('generateBtn');

        function appendMessage(sender, contentRawHtml) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.innerHTML = contentRawHtml;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return msgDiv;
        }

        function renderTrackingTable(rows) {
            if (!rows || rows.length === 0) {
                return `<p>No live tracking rows yet.</p>`;
            }
            const header = `
                <div class="table-wrap">
                <table>
                <thead>
                  <tr>
                    <th>Batch Id</th><th>Report Id</th><th>Customer</th><th>LAN</th><th>Type</th><th>Slot</th>
                    <th>Status</th><th>Retries</th><th>Email</th><th>Email Status</th><th>Error</th>
                  </tr>
                </thead><tbody>
            `;
            const body = rows.map((r) => `
                <tr>
                  <td>${r.batch_id || ''}</td>
                  <td>${r.report_id || ''}</td>
                  <td>${r.customer_code || ''}</td>
                  <td>${r.lan_code || ''}</td>
                  <td>${r.report_type || ''}</td>
                  <td>${r.scheduler_slot || ''}</td>
                  <td>${r.status || ''}</td>
                  <td>${r.retries_used || 0}/${r.max_retries || 5}</td>
                  <td>${r.email_sent === 1 ? 'yes' : 'no'}</td>
                  <td>${r.email_status || ''}</td>
                  <td>${r.last_error_code || ''}</td>
                </tr>
            `).join('');
            return `${header}${body}</tbody></table></div>`;
        }

        async function refreshTrackingTable() {
            const response = await fetch('/session/live_tracks');
            if (!response.ok) {
                return '<p>Unable to load live tracking table.</p>';
            }
            const data = await response.json();
            return renderTrackingTable(data.rows || []);
        }

        async function runSchedule(slot) {
            generateBtn.disabled = true;
            
            appendMessage('user', `<p>Please run schedule: <strong>${slot}</strong></p>`);
            
            const loaderMsg = appendMessage('agent', `
                <p>Running report agent and updating live tracking...</p>
                <div class="typing">
                    <span></span><span></span><span></span>
                </div>
            `);

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 90000);
                const response = await fetch('/session/run_manual_schedule', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ slot: slot }),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                
                loaderMsg.remove();
                
                if (response.ok) {
                    const data = await response.json();
                    const tableHtml = await refreshTrackingTable();
                    
                    appendMessage('agent', `
                        <p>✅ <strong>Schedule complete</strong></p>
                        <p>Agent processed this run and updated live tracking table below.</p>
                        ${tableHtml}
                    `);
                } else {
                    const err = await response.json();
                    appendMessage('agent', `<p>❌ Schedule failed:</p><p style="color: #ef4444; font-family: monospace; font-size: 0.9em;">${err.detail || 'Unknown error'}</p>`);
                }
            } catch (error) {
                loaderMsg.remove();
                const msg = error.name === 'AbortError'
                    ? 'Request timed out after 90s. Check SMTP settings/network and try again.'
                    : error.message;
                appendMessage('agent', `<p>❌ Request failed. Make sure the server is accessible.</p><p style="color: #ef4444; font-family: monospace; font-size: 0.9em;">${msg}</p>`);
            } finally {
                generateBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
