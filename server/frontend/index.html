<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily MRG Report Generator</title>
    <!-- Use Inter font for a clean, modern aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Premium dark mode palette */
            --bg-base: #0f172a;
            --bg-surface: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            
            --accent-primary: #3b82f6;
            --accent-hover: #2563eb;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            
            --shadow-glow: 0 0 20px rgba(59, 130, 246, 0.3);
            
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Subtle background gradient to add depth */
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }

        /* The glassmorphic chat container */
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 85vh;
            margin: 2rem;
            background: var(--bg-surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        .chat-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .avatar-container {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.25rem;
            box-shadow: var(--shadow-glow);
        }

        .header-text h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .header-text p {
            font-size: 0.875rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.25rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #10b981;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.6);
        }

        .chat-messages {
            flex-grow: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Custom Scrollbar for messages area */
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 16px;
            line-height: 1.5;
            position: relative;
            animation: slideUp 0.3s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        .message.agent {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.user {
            background: var(--accent-gradient);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: var(--shadow-glow);
        }

        .message p {
            margin-bottom: 0.5rem;
        }
        .message p:last-child {
            margin-bottom: 0;
        }

        .chat-input-area {
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            background: rgba(15, 23, 42, 0.5);
        }

        /* Premium Buttons */
        .primary-btn {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .primary-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.4);
        }

        .primary-btn:active {
            transform: translateY(1px);
        }

        .primary-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: transparent;
            color: var(--accent-primary);
            border: 1px solid var(--accent-primary);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            margin-top: 1rem;
            transition: all 0.2s;
        }

        .download-btn:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .download-btn svg {
            width: 20px;
            height: 20px;
        }

        .email-form {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .email-input {
            flex-grow: 1;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.875rem;
            outline: none;
            transition: all 0.2s;
        }

        .email-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }

        .secondary-btn {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--border-color);
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .secondary-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .action-container {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .query-controls {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .table-wrap {
            margin-top: 1rem;
            width: 100%;
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }

        th, td {
            border-bottom: 1px solid var(--border-color);
            padding: 0.5rem 0.6rem;
            text-align: left;
            white-space: nowrap;
        }

        th {
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* Typing indicator micro-animation */
        .typing {
            display: flex;
            gap: 0.3rem;
            padding: 0.5rem 0;
            align-items: center;
        }
        
        .typing span {
            width: 6px;
            height: 6px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <header class="chat-header">
            <div class="avatar-container">AI</div>
            <div class="header-text">
                <h1>Multi-Agent Assistant</h1>
                <p><span class="status-dot"></span> Online and ready</p>
            </div>
        </header>

        <div class="chat-messages" id="chatMessages">
            <div class="message agent">
                <p>Hello! I am your Automated Reporting Service.</p>
                <p>Use Report Agent for scheduled generation, and Query Agent to ask natural questions like "why failed", "loan 1 details", or "status summary".</p>
            </div>
        </div>

        <div class="chat-input-area">
            <button class="primary-btn" id="generateBtn" onclick="runSchedule('both')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                Schedule Both Reports Now
            </button>
            <button class="secondary-btn" style="margin-left: 0.5rem;" onclick="runSchedule('10am')">Run 10am</button>
            <button class="secondary-btn" style="margin-left: 0.5rem;" onclick="runSchedule('11am')">Run 11am</button>
        </div>
        <div class="chat-input-area" style="padding-top: 0.75rem;">
            <div class="query-controls">
                <input id="loanInput" class="email-input" type="text" placeholder="Ask Query Agent anything..." />
                <button class="secondary-btn" id="queryBtn" onclick="runQueryAgent()">Run Query Agent</button>
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const generateBtn = document.getElementById('generateBtn');
        const queryBtn = document.getElementById('queryBtn');
        const loanInput = document.getElementById('loanInput');
        loanInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                runQueryAgent();
            }
        });

        function appendMessage(sender, contentRawHtml) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.innerHTML = contentRawHtml;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return msgDiv;
        }

        function renderTrackingTable(rows) {
            if (!rows || rows.length === 0) {
                return `<p>No live tracking rows yet.</p>`;
            }
            const header = `
                <div class="table-wrap">
                <table>
                <thead>
                  <tr>
                    <th>Batch Id</th><th>Report Id</th><th>Customer</th><th>LAN</th><th>Type</th><th>Slot</th>
                    <th>Status</th><th>Retries</th><th>Email</th><th>Email Status</th><th>Error</th>
                  </tr>
                </thead><tbody>
            `;
            const body = rows.map((r) => `
                <tr>
                  <td>${r.batch_id || ''}</td>
                  <td>${r.report_id || ''}</td>
                  <td>${r.customer_code || ''}</td>
                  <td>${r.lan_code || ''}</td>
                  <td>${r.report_type || ''}</td>
                  <td>${r.scheduler_slot || ''}</td>
                  <td>${r.status || ''}</td>
                  <td>${r.retries_used || 0}/${r.max_retries || 5}</td>
                  <td>${r.email_sent === 1 ? 'yes' : 'no'}</td>
                  <td>${r.email_status || ''}</td>
                  <td>${r.last_error_code || ''}</td>
                </tr>
            `).join('');
            return `${header}${body}</tbody></table></div>`;
        }

        async function refreshTrackingTable() {
            const response = await fetch('/session/live_tracks');
            if (!response.ok) {
                return '<p>Unable to load live tracking table.</p>';
            }
            const data = await response.json();
            return renderTrackingTable(data.rows || []);
        }

        async function runSchedule(slot) {
            generateBtn.disabled = true;
            
            appendMessage('user', `<p>Please run schedule: <strong>${slot}</strong></p>`);
            
            const loaderMsg = appendMessage('agent', `
                <p>Running report agent and updating live tracking...</p>
                <div class="typing">
                    <span></span><span></span><span></span>
                </div>
            `);

            try {
                const response = await fetch('/session/run_manual_schedule', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ slot: slot })
                });
                
                loaderMsg.remove();
                
                if (response.ok) {
                    const data = await response.json();
                    const tableHtml = await refreshTrackingTable();
                    
                    appendMessage('agent', `
                        <p>✅ <strong>Schedule complete</strong></p>
                        <p>Agent processed this run and updated live tracking table below.</p>
                        ${tableHtml}
                    `);
                } else {
                    const err = await response.json();
                    appendMessage('agent', `<p>❌ Schedule failed:</p><p style="color: #ef4444; font-family: monospace; font-size: 0.9em;">${err.detail || 'Unknown error'}</p>`);
                }
            } catch (error) {
                loaderMsg.remove();
                appendMessage('agent', `<p>❌ Request failed. Make sure the server is accessible.</p><p style="color: #ef4444; font-family: monospace; font-size: 0.9em;">${error.message}</p>`);
            } finally {
                generateBtn.disabled = false;
            }
        }

        function renderQueryResult(data) {
            if (data && data.intent && data.answer) {
                if (data.intent === 'loan_lookup') {
                    return renderQueryResult(data.answer);
                }
                if (data.intent === 'run_summary') {
                    return `
                        <p>✅ <strong>Query Agent: Run Summary</strong></p>
                        <p>Total: <code>${data.answer.total || 0}</code></p>
                        <p>Success: <code>${data.answer.success || 0}</code> | Failed: <code>${data.answer.failed || 0}</code></p>
                        <p>In progress: <code>${data.answer.in_progress || 0}</code> | Started: <code>${data.answer.started || 0}</code></p>
                    `;
                }
                if (data.intent === 'loan_list') {
                    const loans = (data.answer.loan_numbers || []).map((x) => `<code>${x}</code>`).join(', ');
                    return `
                        <p>✅ <strong>Query Agent: Loan Number List</strong></p>
                        <p>Total loans: <code>${data.answer.count || 0}</code></p>
                        <p>${loans || 'No loans found.'}</p>
                    `;
                }
                if (data.intent === 'loan_details_list') {
                    const rows = (data.answer.loans || []).map((l) =>
                        `<li><code>${l.loan_number}</code> | ${l.account_name} | ${l.customer_name} | <code>${l.customer_email}</code> | ${l.region} | revenue=<code>${l.revenue_musd}</code> incidents=<code>${l.incidents}</code> uptime=<code>${l.uptime_pct}</code> | permanent_fail=<code>${l.should_fail_permanently}</code></li>`
                    ).join('');
                    return `
                        <p>✅ <strong>Query Agent: All Loan Details</strong></p>
                        <p>Total loans: <code>${data.answer.count || 0}</code></p>
                        ${rows ? `<ul>${rows}</ul>` : '<p>No loan details found.</p>'}
                    `;
                }
                if (data.intent === 'customer_list') {
                    const rows = (data.answer.customers || []).map((c) =>
                        `<li><code>${c.customer_code}</code> - ${c.customer_name} - <code>${c.customer_email}</code> - loan <code>${c.loan_number}</code></li>`
                    ).join('');
                    return `
                        <p>✅ <strong>Query Agent: Customer List</strong></p>
                        <p>Total customers: <code>${data.answer.count || 0}</code></p>
                        ${rows ? `<ul>${rows}</ul>` : '<p>No customers found.</p>'}
                    `;
                }
                if (data.intent === 'failure_summary') {
                    const examples = (data.answer.examples || []).map((e) =>
                        `<li><code>${e.report_id}</code> | <code>${e.lan_code}</code> | error=<code>${e.error || ''}</code> | email=<code>${e.email_status || ''}</code></li>`
                    ).join('');
                    return `
                        <p>⚠️ <strong>Query Agent: Failure Summary</strong></p>
                        <p>Failed count: <code>${data.answer.failed_count || 0}</code></p>
                        ${examples ? `<ul>${examples}</ul>` : '<p>No failed examples available yet.</p>'}
                    `;
                }
                if (data.intent === 'help') {
                    return `
                        <p>ℹ️ <strong>Query Agent Help</strong></p>
                        <p>${data.answer.message}</p>
                        <p>Examples: <code>give me all the loan details</code>, <code>give me all the loan numbers</code>, <code>list customers with emails</code>, <code>why failed</code>, <code>loan 2 details</code>.</p>
                    `;
                }
            }

            if (!data || data.found !== true) {
                return `
                    <p>❌ <strong>Query Agent Result: Not Found</strong></p>
                    <p>Loan Number: <code>${data?.loan_number || ''}</code></p>
                    <p>Reason: <code>${data?.reason || 'unknown'}</code></p>
                    <p>Escalation Email: <code>${data?.notify_email || ''}</code></p>
                `;
            }
            return `
                <p>✅ <strong>Query Agent Result: Found</strong></p>
                <p>Loan Number: <code>${data.loan_number}</code></p>
                <p>Customer: <code>${data.customer_code}</code> (${data.customer_name})</p>
                <p>Email: <code>${data.customer_email}</code></p>
                <p>Account: <code>${data.account_name}</code> | Region: <code>${data.region}</code></p>
                <p>Metrics: revenue=<code>${data.metric_revenue_musd}</code>, incidents=<code>${data.metric_incidents}</code>, uptime=<code>${data.metric_uptime_pct}</code></p>
            `;
        }

        async function runQueryAgent() {
            const queryText = loanInput.value.trim();
            if (!queryText) {
                appendMessage('agent', '<p>⚠️ Ask anything, for example: <code>loan 1 details</code>, <code>why failed</code>, or <code>status summary</code>.</p>');
                return;
            }

            queryBtn.disabled = true;
            appendMessage('user', `<p>Query: <strong>${queryText}</strong></p>`);
            loanInput.value = '';

            const loaderMsg = appendMessage('agent', `
                <p>Running query agent lookup...</p>
                <div class="typing">
                    <span></span><span></span><span></span>
                </div>
            `);

            try {
                const response = await fetch('/session/agent/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query_text: queryText })
                });

                loaderMsg.remove();

                if (response.ok) {
                    const data = await response.json();
                    appendMessage('agent', renderQueryResult(data));
                } else {
                    const err = await response.json();
                    appendMessage('agent', `<p>❌ Query failed:</p><p style="color: #ef4444; font-family: monospace; font-size: 0.9em;">${err.detail || 'Unknown error'}</p>`);
                }
            } catch (error) {
                loaderMsg.remove();
                appendMessage('agent', `<p>❌ Query request failed.</p><p style="color: #ef4444; font-family: monospace; font-size: 0.9em;">${error.message}</p>`);
            } finally {
                queryBtn.disabled = false;
                loanInput.focus();
            }
        }
    </script>
</body>
</html>
